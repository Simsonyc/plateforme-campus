
services:
  postgres:
    image: postgres:16
    container_name: plateforme-campus-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: plateforme_campus
      POSTGRES_USER: campus_user
      POSTGRES_PASSWORD: campus_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: plateforme-campus-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  minio:
    image: minio/minio
    container_name: plateforme-campus-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: campus_minio
      MINIO_ROOT_PASSWORD: campus_minio_secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

volumes:
  postgres_data:
  minio_data: